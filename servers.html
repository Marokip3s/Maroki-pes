<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Servers</title>

<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/servers.css">

</head>

<body>

<div class="sidebar">

<h2>Marokip3s</h2>

<a href="dashboard.html">Dashboard</a>

<a href="matches.html">Matches</a>

<a href="servers.html" class="active">Servers</a>

<a href="#">Competitions</a>

<a href="#">Teams</a>

<a href="index.html">Logout</a>

</div>

<div class="content">

<div class="top-bar">

<h1>Servers</h1>

<button id="addBtn">
Add Server
</button>

</div>

<div class="search-box">

<input
type="text"
id="search"
placeholder="Search..."
onkeyup="searchServers()">

</div>

<table>

<thead>

<tr>

<th>ID</th>

<th>Match</th>

<th>Name</th>

<th>Quality</th>

<th>Type</th>

<th>Status</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="serversTable">

</tbody>

</table>

</div>
<!-- Server Modal -->
<div class="modal" id="serverModal">

    <div class="modal-content">

        <h2 id="modalTitle">Add Server</h2>

        <label>Match</label>
        <select id="match_id"></select>

        <label>Server Name</label>
        <input type="text" id="name" placeholder="Server 1">

        <label>Quality</label>
        <input type="text" id="quality" placeholder="HD / FHD / 4K">

        <label>Type</label>
        <select id="type">
            <option value="m3u8">M3U8</option>
            <option value="mpd">MPD</option>
            <option value="embed">Embed</option>
            <option value="youtube">YouTube</option>
            <option value="iframe">Iframe</option>
        </select>

        <label>URL</label>
        <textarea
            id="url"
            rows="5"
            placeholder="https://example.com/live.m3u8"></textarea>

        <label>Status</label>
        <select id="enabled">
            <option value="1">Enabled</option>
            <option value="0">Disabled</option>
        </select>

        <label>Sort Order</label>
        <input
            type="number"
            id="sort_order"
            value="1">

        <div class="modal-buttons">

            <button id="saveBtn">
                Save
            </button>

            <button
                type="button"
                onclick="closeModal()">
               Cancel
            </button>

        </div>

    </div>

</div>

<script src="js/servers.js"></script>

</body>
</html>
